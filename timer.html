<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间 TIMER - 椎名绫宫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: none;
            outline: none;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0c10;
            z-index: -2;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
            pointer-events: none;
        }
        .fog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.025);
            pointer-events: none;
            z-index: 1;
            animation: fog-float 25s linear infinite;
            opacity: 0.3;
        }
        @keyframes fog-float {
            0% { transform: translateY(10px); opacity: 0.2; }
            50% { transform: translateY(-10px); opacity: 0.4; }
            100% { transform: translateY(10px); opacity: 0.2; }
        }
        .rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .rain {
            position: absolute;
            background: linear-gradient(to top, 
              rgba(255,255,255,0.95) 0%, 
              rgba(255,255,255,0.6) 50%, 
              rgba(255,255,255,0) 100%
            );
            width: 1.8px;
            height: 85px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.85;
            animation: rain-rise linear infinite;
        }
        @keyframes rain-rise {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
        .splash {
            position: fixed;
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            animation: splash-animation 0.6s ease-out forwards;
        }
        @keyframes splash-animation {
            0% { opacity: 1; transform: scale(0.2); }
            50% { opacity: 0.8; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.8); }
        }
        body {
            font-family: "SimSun", "宋体", serif;
            color: #e2e8f0;
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            padding: 20px;
        }
        .glass {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            border: 1px solid #1e293b;
        }
        .center-main {
            width: 100%;
            max-width: 620px;
            padding: 2.5rem;
            border-radius: 10px;
        }
        .setting-inner {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .setting-title {
            font-size: 1.7rem;
            color: #4299e1;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #1e293b;
            width: fit-content;
            margin: 0 auto;
            letter-spacing: 1px;
        }
        .time-input {
            width: 100%;
            padding: 1rem;
            border-radius: 6px;
            background: rgba(30, 41, 59, 0.7);
            color: #e2e8f0;
            font-size: 1rem;
            font-family: "SimSun", "宋体", serif;
            border: 1px solid #1e293b;
            transition: 0.3s;
        }
        .time-input:focus {
            border-color: #4299e1;
            background: rgba(30, 41, 59, 0.8);
        }
        .btn-group {
            display: flex;
            gap: 16px;
            width: 100%;
        }
        .md-btn {
            flex: 1;
            padding: 1rem;
            border-radius: 6px;
            font-size: 1rem;
            font-family: "SimSun", "宋体", serif;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-start {
            background: rgba(66, 153, 225, 0.3);
            color: #ffffff;
            border: 1px solid rgba(66, 153, 225, 0.4);
        }
        .btn-start:hover {
            background: rgba(66, 153, 225, 0.4);
            border-color: rgba(66, 153, 225, 0.6);
        }
        .btn-reset {
            background: transparent;
            color: #cbd5e1;
            border: 1px solid #1e293b;
        }
        .btn-reset:hover {
            background: rgba(30, 41, 59, 0.5);
            color: #fff;
        }
        .count-wrap {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .time-big-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 8px;
            padding: 30px 20px;
            min-width: 120px;
            border: 1px solid #1e293b;
            transition: 0.3s;
        }
        .time-big-card:hover {
            border-color: #4299e1;
        }
        .roll-viewport {
            position: relative;
            height: 70px;
            overflow: hidden;
        }
        .roll-inner {
            transition: transform 0.5s cubic-bezier(0.22, 0.1, 0.25, 1.05);
        }
        .num-item {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            font-weight: normal;
            color: #fff;
        }
        .big-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 8px;
        }
        .finish-text {
            font-size: 2rem;
            color: #4299e1;
        }
        .status-tip {
            margin-top: 2rem;
            font-size: 1rem;
            color: #94a3b8;
            z-index: 10;
        }
        footer {
            margin-top: 3rem;
            color: #64748b;
            font-size: 0.9rem;
            z-index: 10;
        }
        @media (max-width: 600px) {
            .num-item { font-size: 36px; height: 50px; }
            .roll-viewport { height: 50px; }
            .time-big-card { min-width: 90px; padding: 20px 15px; }
            .center-main { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="fog"></div>
    <div class="rain-container" id="rain"></div>

    <div class="center-main glass" id="centerBox">
        <div class="setting-inner" id="settingPanel">
            <h2 class="setting-title">时间 TIMER</h2>
            <input type="time" id="timePicker" class="time-input">
            <div class="btn-group">
                <button class="md-btn btn-start" id="startBtn">开始旅程</button>
                <button class="md-btn btn-reset" id="resetBtn">重置</button>
            </div>
        </div>
    </div>

    <div class="status-tip" id="statusTip">欢迎回来，旅程要开始了吗？</div>

    <footer>2026 椎名绫宫 - Protect, Remove, Reborn.</footer>

    <script>
        let timer = null;
        let lastVals = { h:-1, m:-1, s:-1 };
        const centerBox = document.getElementById('centerBox');
        const settingPanel = document.getElementById('settingPanel');
        const timePicker = document.getElementById('timePicker');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusTip = document.getElementById('statusTip');

        const now = new Date();
        const curH = String(now.getHours()).padStart(2,'0');
        const curM = String(now.getMinutes()).padStart(2,'0');
        timePicker.min = `${curH}:${curM}`;

        function initCountDOM(){
            centerBox.innerHTML = `
                <div class="count-wrap">
                    <div class="time-big-card">
                        <div class="roll-viewport"><div class="roll-inner" id="hRoll"><div class="num-item">00</div></div></div>
                        <div class="big-label">时</div>
                    </div>
                    <div class="time-big-card">
                        <div class="roll-viewport"><div class="roll-inner" id="mRoll"><div class="num-item">00</div></div></div>
                        <div class="big-label">分</div>
                    </div>
                    <div class="time-big-card">
                        <div class="roll-viewport"><div class="roll-inner" id="sRoll"><div class="num-item">00</div></div></div>
                        <div class="big-label">秒</div>
                    </div>
                </div>
            `;
            lastVals = { h:-1, m:-1, s:-1 };
        }

        function rollUpdate(rollId, newVal){
            const wrap = document.getElementById(rollId);
            const itemHeight = wrap.querySelector('.num-item').offsetHeight;
            const newDom = document.createElement('div');
            newDom.className = 'num-item';
            newDom.textContent = newVal;
            wrap.appendChild(newDom);
            wrap.style.transform = `translateY(-${itemHeight}px)`;
            setTimeout(()=>{
                wrap.style.transition = 'none';
                wrap.style.transform = 'translateY(0)';
                wrap.firstElementChild.remove();
                setTimeout(()=>{ wrap.style.transition = ''; },20);
            }, 500);
        }

        function updateCount(target){
            const diff = target - Date.now();
            if (diff <= 0) {
                clearInterval(timer);
                centerBox.innerHTML = `<div class="finish-text">旅程告一段落</div>`;
                statusTip.textContent = '时间已到，新的开始。';
                return;
            }
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const hTxt = String(h).padStart(2,'0');
            const mTxt = String(m).padStart(2,'0');
            const sTxt = String(s).padStart(2,'0');
            if(lastVals.h !== h) { rollUpdate('hRoll', hTxt); lastVals.h = h; }
            if(lastVals.m !== m) { rollUpdate('mRoll', mTxt); lastVals.m = m; }
            if(lastVals.s !== s) { rollUpdate('sRoll', sTxt); lastVals.s = s; }
        }

        startBtn.addEventListener('click', () => {
            const val = timePicker.value;
            if (!val) {
                statusTip.textContent = '请先选择目标时间';
                return;
            }
            const [selH, selM] = val.split(':');
            const target = new Date();
            target.setHours(+selH, +selM, 0, 0);
            if (target <= new Date()) {
                statusTip.textContent = '无法前往过去，请选择未来时间';
                return;
            }
            statusTip.textContent = '时间逐渐消逝，未来正在向你靠近。';
            initCountDOM();
            if (timer) clearInterval(timer);
            updateCount(target);
            timer = setInterval(() => updateCount(target), 1000);
        });

        resetBtn.addEventListener('click', () => {
            if (timer) clearInterval(timer);
            timer = null;
            timePicker.value = '';
            statusTip.textContent = '欢迎回来，旅程即将开始。';
            centerBox.innerHTML = settingPanel.outerHTML;
        });

        const rainContainer = document.getElementById('rain');
        function createRain() {
            const rainDrop = document.createElement('div');
            rainDrop.classList.add('rain');
            const left = Math.random() * 100;
            const duration = Math.random() * 1.8 + 1.2;
            const height = Math.random() * 70 + 50;
            rainDrop.style.left = left + '%';
            rainDrop.style.height = height + 'px';
            rainDrop.style.animationDuration = duration + 's';
            rainContainer.appendChild(rainDrop);
            setTimeout(() => rainDrop.remove(), duration * 1000);
        }
        setInterval(createRain, 120);
    </script>
</body>
</html>
