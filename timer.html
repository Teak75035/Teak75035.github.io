<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间 TIMER</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <style>
        :root {
            --md-sys-color-primary: #006590;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #c8e6f7;
            --md-sys-color-on-primary-container: #001e2f;
            --md-sys-color-background: #f6faff;
            --md-sys-color-on-background: #191c20;
            --md-sys-color-surface-variant: #dee3ea;
            --md-sys-color-on-surface-variant: #42474e;
            --md-sys-color-outline: #72777f;
            --md-shadow-2: 0 4px 12px rgba(0, 0, 0, 0.12);
            --md-radius-lg: 28px;
            --md-radius-sm: 16px;
            /* 轻微回弹，稳重不浮夸 */
            --roll-ease: cubic-bezier(0.22, 0.1, 0.25, 1.05);
            --roll-time: 0.5s;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --md-sys-color-primary: #7fd0ff;
                --md-sys-color-on-primary: #00354b;
                --md-sys-color-primary-container: #004d6d;
                --md-sys-color-on-primary-container: #c8e6f7;
                --md-sys-color-background: #0f1418;
                --md-sys-color-on-background: #e0e6ed;
                --md-sys-color-surface-variant: #2f343b;
                --md-sys-color-on-surface-variant: #c2c7cf;
                --md-sys-color-outline: #8c9199;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            gap: 48px;
        }

        .center-main {
            width: 100%;
            max-width: 620px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 320px;
        }

        .setting-inner {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .setting-title {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .time-input {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            border-radius: var(--md-radius-sm);
            border: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-on-background);
            font-size: 20px;
        }
        .time-input:focus {
            outline: none;
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 2px rgba(0,101,144,0.15);
        }

        .btn-group {
            display: flex;
            gap: 16px;
            width: 100%;
            max-width: 500px;
        }

        .md-btn {
            flex: 1;
            padding: 18px;
            border-radius: var(--md-radius-sm);
            border: none;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-start {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }
        .btn-start:hover { filter: brightness(1.08); }
        .btn-start:active { transform: scale(0.98); }

        .btn-reset {
            background: transparent;
            color: var(--md-sys-color-primary);
            border: 1px solid var(--md-sys-color-outline);
        }
        .btn-reset:hover { background: var(--md-sys-color-surface-variant); }
        .btn-reset:active { transform: scale(0.98); }

        .count-wrap {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .time-big-card {
            background: var(--md-sys-color-primary-container);
            border-radius: var(--md-radius-lg);
            padding: 40px 30px;
            min-width: 140px;
            text-align: center;
            box-shadow: var(--md-shadow-2);
            overflow: hidden;
        }

        /* 滚筒视口容器 */
        .roll-viewport {
            position: relative;
            height: 90px;
            overflow: hidden;
        }

        /* 滚动内层：整体上下平移，翻页效果 */
        .roll-inner {
            transition: transform var(--roll-time) var(--roll-ease);
        }

        .num-item {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: 700;
            color: var(--md-sys-color-on-primary-container);
            line-height: 1.05;
        }

        .big-label {
            font-size: 20px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface-variant);
            margin-top: 12px;
        }

        .finish-text {
            font-size: 52px;
            font-weight: 700;
            color: var(--md-sys-color-primary);
        }

        .status-tip {
            font-size: 18px;
            color: var(--md-sys-color-on-surface-variant);
            text-align: center;
        }

        @media (max-width: 600px) {
            .num-item { font-size: 56px; height: 64px; }
            .roll-viewport, .roll-inner div { height: 64px; }
            .time-big-card { min-width: 110px; padding: 30px 20px; }
            .setting-title { font-size: 24px; }
            body { gap: 36px; }
        }
    </style>
</head>
<body>
    <div class="center-main" id="centerBox">
        <div class="setting-inner" id="settingPanel">
            <h2 class="setting-title">
                <span class="material-icons">schedule</span>
                你的目的地
            </h2>
            <input type="time" id="timePicker" class="time-input">
            <div class="btn-group">
                <button class="md-btn btn-start" id="startBtn">
                    <span class="material-icons">play_arrow</span>开始旅程
                </button>
                <button class="md-btn btn-reset" id="resetBtn">
                    <span class="material-icons">refresh</span>重置
                </button>
            </div>
        </div>
    </div>

    <div class="status-tip" id="statusTip">欢迎回来，旅程要开始了吗？</div>

    <script>
        let timer = null;
        let lastVals = { h:-1, m:-1, s:-1 };
        const centerBox = document.getElementById('centerBox');
        const settingPanel = document.getElementById('settingPanel');
        const timePicker = document.getElementById('timePicker');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusTip = document.getElementById('statusTip');

        const now = new Date();
        const curH = String(now.getHours()).padStart(2,'0');
        const curM = String(now.getMinutes()).padStart(2,'0');
        timePicker.min = `${curH}:${curM}`;

        // 初始化滚筒结构
        function initCountDOM(){
            centerBox.innerHTML = `
                <div class="count-wrap">
                    <div class="time-big-card">
                        <div class="roll-viewport">
                            <div class="roll-inner" id="hRoll">
                                <div class="num-item">00</div>
                            </div>
                        </div>
                        <div class="big-label">HOURS</div>
                    </div>
                    <div class="time-big-card">
                        <div class="roll-viewport">
                            <div class="roll-inner" id="mRoll">
                                <div class="num-item">00</div>
                            </div>
                        </div>
                        <div class="big-label">MINUTES</div>
                    </div>
                    <div class="time-big-card">
                        <div class="roll-viewport">
                            <div class="roll-inner" id="sRoll">
                                <div class="num-item">00</div>
                            </div>
                        </div>
                        <div class="big-label">SECONDS</div>
                    </div>
                </div>
            `;
            lastVals = { h:-1, m:-1, s:-1 };
        }

        // 翻页滚筒：追加新数字 → 整体上移视口，旧数字向下滚出，新数字从上面划入
        function rollUpdate(rollId, newVal){
            const wrap = document.getElementById(rollId);
            const itemHeight = wrap.querySelector('.num-item').offsetHeight;
            // 添加新节点
            const newDom = document.createElement('div');
            newDom.className = 'num-item';
            newDom.textContent = newVal;
            wrap.appendChild(newDom);
            // 滚动位移
            wrap.style.transform = `translateY(-${itemHeight}px)`;
            // 动画结束删掉旧节点，重置位置无缝衔接
            setTimeout(()=>{
                wrap.style.transition = 'none';
                wrap.style.transform = 'translateY(0)';
                wrap.firstElementChild.remove();
                // 恢复过渡
                setTimeout(()=>{
                    wrap.style.transition = '';
                },20);
            }, 500);
        }

        function updateCount(target){
            const diff = target - Date.now();
            if (diff <= 0) {
                clearInterval(timer);
                centerBox.innerHTML = `<div class="finish-text">旅程告一段落</div>`;
                statusTip.textContent = '旅程结束了，也许是开始的反向投影。';
                return;
            }
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            const hTxt = String(h).padStart(2,'0');
            const mTxt = String(m).padStart(2,'0');
            const sTxt = String(s).padStart(2,'0');

            if(lastVals.h !== h) { rollUpdate('hRoll', hTxt); lastVals.h = h; }
            if(lastVals.m !== m) { rollUpdate('mRoll', mTxt); lastVals.m = m; }
            if(lastVals.s !== s) { rollUpdate('sRoll', sTxt); lastVals.s = s; }
        }

        startBtn.addEventListener('click', () => {
            const val = timePicker.value;
            if (!val) {
                statusTip.textContent = '请先选择目标位置';
                statusTip.style.color = '#b3261e';
                return;
            }
            const [selH, selM] = val.split(':');
            const target = new Date();
            target.setHours(+selH, +selM, 0, 0);

            if (target <= new Date()) {
                statusTip.textContent = '警告：你尚未获得前往过去的通行权限';
                statusTip.style.color = '#b3261e';
                return;
            }

            statusTip.textContent = '时间逐渐消逝，未来正在向你靠近。';
            statusTip.style.color = '';

            initCountDOM();
            if (timer) clearInterval(timer);
            updateCount(target);
            timer = setInterval(() => updateCount(target), 1000);
        });

        resetBtn.addEventListener('click', () => {
            if (timer) clearInterval(timer);
            timer = null;
            timePicker.value = '';
            statusTip.textContent = '欢迎回来，旅程即将开始。';
            statusTip.style.color = '';
            centerBox.innerHTML = settingPanel.outerHTML;
        });
    </script>
</body>
